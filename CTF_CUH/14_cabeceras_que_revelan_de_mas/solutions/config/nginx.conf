server {
    listen 443 ssl;
    server_tokens off;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'";
    add_header X-Frame-Options DENY;
    add_header Cache-Control "no-store";
    location / {
        proxy_pass http://app;
    }
}
